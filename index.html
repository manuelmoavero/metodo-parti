// Chiamato una volta in App.js; il risultato sostituisce TASSELLI in tutto il wiring.
// Panel e componenti ricevono oggetti identici nella forma, ignari della config.
function mergeTasselli(tasselli, config) {
  return tasselli.map(t => ({
    ...t,
    ...(config.tasselli[t.id] || {}),
  }));

// ===== data/supabase.js =====
// data/supabase.js
// Client Supabase minimale (senza SDK: fetch nativo + REST API).
// Espone: supabaseAuth (login/signup/logout/onAuthStateChange)
//         e le funzioni di I/O per day_data e flag_data.
//
// Perché senza SDK: l'app non usa bundler; caricare @supabase/supabase-js
// via CDN aggiunge ~250kb e richiede ES modules. Il REST API di Supabase
// è stabile e sufficiente per le operazioni che usiamo.

const SUPA_URL  = "https://ojhqieknxhsrxyvdowja.supabase.co";
const SUPA_KEY  = "sb_publishable_W3axOEhDUPPdMZ1tKXtCug_l-35rcw4";

// ── Token in memoria (non in localStorage per sicurezza) ──────────────────
let _accessToken  = null;
let _refreshToken = null;
let _authListeners = [];

function _notifyListeners(user) {
  _authListeners.forEach(fn => fn(user));
}

// Restituisce gli header comuni per le chiamate autenticate.
function _headers(extra = {}) {
  const h = {
    "Content-Type": "application/json",
    "apikey": SUPA_KEY,
    ...extra,
  };
  if (_accessToken) h["Authorization"] = `Bearer ${_accessToken}`;
  return h;
}

// ── Auth ──────────────────────────────────────────────────────────────────
const supabaseAuth = {

  // Registrazione nuova utente
  async signUp(email, password) {
    const res = await fetch(`${SUPA_URL}/auth/v1/signup`, {
      method: "POST",
      headers: _headers(),
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || "Errore registrazione");
    if (data.access_token) _setSession(data);
    return data;
  },

  // Login
  async signIn(email, password) {
    const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: _headers(),
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || "Credenziali non valide");
    _setSession(data);
    return data;
  },

  // Logout
  async signOut() {
    if (_accessToken) {
      await fetch(`${SUPA_URL}/auth/v1/logout`, {
        method: "POST",
        headers: _headers(),
      }).catch(() => {});
    }
    _clearSession();
  },

  // Recupera la sessione salvata (chiamato al mount di App)
  async restoreSession() {
    const stored = localStorage.getItem("parti_auth");
    if (!stored) return null;
    try {
      const { accessToken, refreshToken } = JSON.parse(stored);
      _accessToken  = accessToken;
      _refreshToken = refreshToken;
      // Verifica che il token sia ancora valido
      const user = await supabaseAuth.getUser();
      if (user) {
        _notifyListeners(user);
        return user;
      }
    } catch (e) {}
    _clearSession();
    return null;
  },

  // Ritorna l'utente corrente dal server
  async getUser() {
    if (!_accessToken) return null;
    try {
      const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
        headers: _headers(),
      });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  },

  // Registra un listener per i cambiamenti di sessione
  onAuthStateChange(fn) {
    _authListeners.push(fn);
    return () => { _authListeners = _authListeners.filter(l => l !== fn); };
  },

  getCurrentUserId() {
    return _accessToken ? _parseJwtUserId(_accessToken) : null;
  },
};

// ── Helpers sessione ──────────────────────────────────────────────────────
function _setSession(data) {
  _accessToken  = data.access_token;
  _refreshToken = data.refresh_token;
  try {
    localStorage.setItem("parti_auth", JSON.stringify({
      accessToken:  _accessToken,
      refreshToken: _refreshToken,
    }));
  } catch (e) {}
  const user = data.user || { id: _parseJwtUserId(_accessToken), email: data.email };
  _notifyListeners(user);
}

function _clearSession() {
  _accessToken  = null;
  _refreshToken = null;
  try { localStorage.removeItem("parti_auth"); } catch (e) {}
  _notifyListeners(null);
}

function _parseJwtUserId(token) {
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    return payload.sub;
  } catch (e) {
    return null;
  }
}

// ── I/O dati giornalieri ──────────────────────────────────────────────────

// Carica tutti i day_data e flag_data dell'utente loggato.
// Restituisce { daysData: {}, flagsData: {} } nel formato già usato da App.
async function loadAllFromSupabase() {
  const userId = supabaseAuth.getCurrentUserId();
  if (!userId) return null;

  const [dayRes, flagRes] = await Promise.all([
    fetch(`${SUPA_URL}/rest/v1/day_data?user_id=eq.${userId}&select=date_key,data`, {
      headers: _headers({ "Accept": "application/json" }),
    }),
    fetch(`${SUPA_URL}/rest/v1/flag_data?user_id=eq.${userId}&select=date_key,data`, {
      headers: _headers({ "Accept": "application/json" }),
    }),
  ]);

  if (!dayRes.ok || !flagRes.ok) {
    console.error("[supa] load FALLITO", dayRes.status, flagRes.status);
    return null;
  }

  const dayRows  = await dayRes.json();
  const flagRows = await flagRes.json();

  const daysData  = {};
  const flagsData = {};
  dayRows.forEach(r  => { daysData[r.date_key]  = r.data; });
  flagRows.forEach(r => { flagsData[r.date_key] = r.data; });

  return { daysData, flagsData };
}

// Salva (upsert) un singolo giorno su day_data.
async function saveDayToSupabase(dateKey, data) {
  const userId = supabaseAuth.getCurrentUserId();
  if (!userId) return;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/day_data?on_conflict=user_id,date_key`, {
      method: "POST",
      headers: _headers({
        "Prefer": "resolution=merge-duplicates,return=minimal",
      }),
      body: JSON.stringify({ user_id: userId, date_key: dateKey, data, updated_at: new Date().toISOString() }),
    });
    if (!res.ok) {
      const body = await res.text();
      console.error("[supa] saveDay FALLITO", res.status, body);
    }
  } catch (e) {
    console.error("[supa] saveDay ERRORE rete", e);
  }
}

// Cancella il giorno corrente da day_data (usato da resetToday).
async function deleteDayFromSupabase(dateKey) {
  const userId = supabaseAuth.getCurrentUserId();
  if (!userId) return;
  await fetch(`${SUPA_URL}/rest/v1/day_data?user_id=eq.${userId}&date_key=eq.${dateKey}`, {
    method: "DELETE",
    headers: _headers(),
  }).catch(() => {});
}

// ── Storage locale per scope ──────────────────────────────────────────────
// Due spazi dati distinti che NON si mescolano mai:
//   - anonimo:  parti_day:<date>            / parti_flag:<date>
//   - account:  parti_acct:<uid>:day:<date> / parti_acct:<uid>:flag:<date>
// Lo scope account è la cache locale dei dati remoti, per funzionamento offline.
const partiStore = {

  // Prefissi per uno scope. userId === null => scope anonimo.
  _prefixes(userId) {
    if (userId) {
      return {
        day:  `parti_acct:${userId}:day:`,
        flag: `parti_acct:${userId}:flag:`,
      };
    }
    return { day: "parti_day:", flag: "parti_flag:" };
  },

  // Legge { daysData, flagsData } dallo scope indicato.
  load(userId) {
    const { day, flag } = this._prefixes(userId);
    const daysData  = {};
    const flagsData = {};
    Object.keys(localStorage).forEach((k) => {
      if (k.startsWith(day)) {
        try { daysData[k.slice(day.length)] = JSON.parse(localStorage.getItem(k)); } catch (e) {}
      } else if (k.startsWith(flag)) {
        try { flagsData[k.slice(flag.length)] = JSON.parse(localStorage.getItem(k)); } catch (e) {}
      }
    });
    return { daysData, flagsData };
  },

  // Scrive un singolo giorno nello scope.
  setDay(userId, dateKey, data) {
    const { day } = this._prefixes(userId);
    try { localStorage.setItem(`${day}${dateKey}`, JSON.stringify(data)); } catch (e) {}
  },

  // Scrive i flag di un giorno nello scope.
  setFlag(userId, dateKey, data) {
    const { flag } = this._prefixes(userId);
    try { localStorage.setItem(`${flag}${dateKey}`, JSON.stringify(data)); } catch (e) {}
  },

  // Rimuove un giorno dallo scope.
  removeDay(userId, dateKey) {
    const { day } = this._prefixes(userId);
    try { localStorage.removeItem(`${day}${dateKey}`); } catch (e) {}
  },

  // Svuota completamente uno scope (usato prima di un import).
  clear(userId) {
    const { day, flag } = this._prefixes(userId);
    Object.keys(localStorage)
      .filter((k) => k.startsWith(day) || k.startsWith(flag))
      .forEach((k) => localStorage.removeItem(k));
  },

  // Rimpiazza l'intero contenuto di uno scope con i dati passati.
  replace(userId, daysData, flagsData) {
    this.clear(userId);
    Object.entries(daysData).forEach(([k, v])  => this.setDay(userId, k, v));
    Object.entries(flagsData).forEach(([k, v]) => this.setFlag(userId, k, v));
  },
};

// ===== logic/dates.js =====
// logic/dates.js
// Funzioni pure su date e finestra rolling. Nessun React.
// todayKey, rollingGranello, dayLabel, daysAgoKey, dateKeyDaysBefore.

function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// Returns total granello consumed in the last 7 days (rolling window, inclusive of today)
function rollingGranello(daysData, todayKey) {
  let total = 0;
  for (let i = 0; i <= 6; i++) {
    const key = i === 0 ? todayKey : dateKeyDaysBefore(todayKey, i);
    const day = daysData[key];
    if (day && day.granello) total += day.granello;
  }
  return Math.round(total * 10) / 10;
}

function dayLabel(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(d);
  target.setHours(0, 0, 0, 0);
  const diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return "Oggi";
  if (diffDays === -1) return "Ieri";
  if (diffDays === 1) return "Domani";
  const dayNames = ["dom", "lun", "mar", "mer", "gio", "ven", "sab"];
  return `${dayNames[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1}`;
}

function daysAgoKey(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function dateKeyDaysBefore(dateKey, n) {
  const d = new Date(dateKey + "T12:00:00");
  d.setDate(d.getDate() - n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// ===== logic/compensation.js =====
// logic/compensation.js
// Motore di compensazione degli sforamenti. Funzioni pure, nessun React.

// ============================================================
// COMPENSATION LOGIC
// ============================================================
//
// Strategy:
// For each tassello that has a max/target rule, we walk backward from the
// target day looking at each previous day. For every day where the user
// exceeded the target, we generate a "debt" that is spread over N days
// following that overflow. The spread (days and amount per day) is
// determined by the rules from the "Metodo delle parti" poster.
//
// As we walk forward through days after the overflow, we subtract the
// daily compensation if and only if the user actually reduced consumption
// on those days. If on a subsequent day the user also overflowed, that
// generates additional debt.
//
// We return the net adjustment that should apply to the target day, in
// the form of an object { tasselloId: { delta, reason, sourceDate } }.
//
// Il cap di ogni tassello è derivato dalla config: softMax ?? target.
// Non è duplicato qui: se il target per-utente cambia, il cap segue automaticamente.

function computeCompensation(daysData, targetDateKey, userConfig) {
  const compCfg = userConfig.compensation;
  const lookbackDays = compCfg.lookbackDays;
  const adjustments = {};

  const ids = ["energia", "forza", "oro", "frutto"];
  for (const id of ids) {
    const rule = compCfg[id];
    if (!rule) continue;
    const tCfg = userConfig.tasselli[id];
    const cap = tCfg.softMax != null ? tCfg.softMax : tCfg.target;
    computeForTassello(
      daysData,
      targetDateKey,
      lookbackDays,
      { id, cap, ...rule },
      adjustments
    );
  }

  return adjustments;
}

// Helper: walks days from oldest to most-recent within the window
// and accumulates the active debt for a given tassello, then returns
// the residual adjustment that applies to targetDateKey
function computeForTassello(daysData, targetDateKey, lookbackDays, rule, adjustments) {
  // Build the sequence of date keys from lookbackDays ago up to (but excluding)
  // the target day
  const sequence = [];
  for (let i = lookbackDays; i >= 1; i--) {
    sequence.push(dateKeyDaysBefore(targetDateKey, i));
  }
  // sequence is now [oldest, ..., yesterday]

  // Walk through and accumulate debt
  // debt = how many parti the user still owes back
  let debt = 0;
  let sourceDates = [];

  for (const dayKey of sequence) {
    const day = daysData[dayKey];
    const consumed = day ? (day[rule.id] || 0) : null;

    if (consumed != null && consumed > rule.cap) {
      // User overflowed this day. Add to debt.
      const overflow = consumed - rule.cap;
      debt += overflow;
      sourceDates.push(dayKey);
    } else if (debt > 0 && consumed != null) {
      // User had a normal day. If they consumed below the cap, they "paid" debt.
      // We measure payment as how much under the cap they went, but no more than
      // the per-day reduction allowed.
      const wouldOweToday = rule.perDayReduction;
      const actualReduction = Math.max(0, rule.cap - consumed);
      const paid = Math.min(wouldOweToday, actualReduction, debt);
      debt -= paid;
    }
    // If no data for that day, we don't change debt (we don't know what happened)
  }

  if (debt > 0.001) {
    // There's still residual debt to apply to the target day
    // The reduction we apply today is min(perDayReduction, remaining debt)
    const reduction = Math.min(rule.perDayReduction, debt);
    adjustments[rule.id] = {
      delta: -reduction,
      reason: "rientro da sfori dei giorni scorsi",
      sourceDates: sourceDates,
      remainingDebt: debt,
    };
  }
}

// ===== logic/flags-engine.js =====
// logic/flags-engine.js
// Calcolo dello stato dei flag (daysSince, streak, status). Pura, nessun React.

// ============================================================
// FLAGS STATE ENGINE
// ============================================================
// Returns for each flag: { daysSince, streak, status }
// status: "ok" | "warn" | "alert" | "streak_max"

function computeFlagStates(flagsData, targetDateKey) {
  const result = {};
  FLAGS.forEach((flag) => {
    const tappedToday = !!(flagsData[targetDateKey] && flagsData[targetDateKey][flag.id]);

    // daysSince: 0 se tappato oggi, altrimenti giorni dall'ultimo tap (max 31)
    let daysSince = 0;
    if (!tappedToday) {
      daysSince = 31;
      for (let i = 1; i <= 30; i++) {
        if (flagsData[dateKeyDaysBefore(targetDateKey, i)]?.[flag.id]) {
          daysSince = i;
          break;
        }
      }
    }

    // streak: giorni consecutivi tappati fino a ieri (solo per maxStreakDays)
    let streak = 0;
    if (flag.maxStreakDays) {
      for (let i = 1; i <= 30; i++) {
        if (flagsData[dateKeyDaysBefore(targetDateKey, i)]?.[flag.id]) {
          streak++;
        } else {
          break;
        }
      }
    }

    let status = "ok";
    if (tappedToday) {
      if (flag.maxStreakDays && streak >= flag.maxStreakDays) status = "streak_max";
    } else {
      if (daysSince >= flag.alertAfterDays) status = "alert";
      else if (daysSince >= flag.warnAfterDays) status = "warn";
    }

    result[flag.id] = { daysSince, streak, status, tappedToday };
  });
  return result;
}

// ===== logic/suggestions.js =====
// logic/suggestions.js
// Rilevamento deficit su finestra (daysBelow) e generazione tip (suggestions).
// Funzioni pure, nessun React.

// ============================================================
// SUGGESTIONS ENGINE
// ============================================================

// ============================================================
// WINDOW-BASED DEFICIT DETECTION
// ============================================================
// Returns how many of the last N days (excluding today) a tassello was below target.
// Used to decide urgency: if below target for several days in a row, it's a real problem.

function daysBelow(daysData, tasselloId, target, windowDays, todayKey) {
  let count = 0;
  let daysWithData = 0;
  for (let i = 1; i <= windowDays; i++) {
    const key = dateKeyDaysBefore(todayKey, i);
    const day = daysData[key];
    if (!day) continue;
    // Un giorno conta come "con dati" solo se almeno un tassello ha valore > 0
    const hasRealData = Object.values(day).some((v) => v > 0);
    if (!hasRealData) continue;
    daysWithData++;
    const consumed = day[tasselloId] || 0;
    if (consumed < target) count++;
  }
  if (daysWithData === 0) return -1; // sentinel: nessun dato storico reale
  return count;
}

// tasselli: array mergiato (TASSELLI + config), già con i valori per-utente
// granelloConfig: userConfig.granello
function suggestions(today, adjustedTargets, daysData, currentDate, granelloRolling, todayFlags, tasselli, granelloConfig) {
  const tips = [];

  tasselli.forEach((t) => {
    const consumed = today[t.id] || 0;
    const target = adjustedTargets[t.id] ?? t.target;

    if (t.isMin) {
      // Foglia, Colore — finestra 3 giorni
      // Warning urgente solo se sotto per 3 giorni consecutivi incluso oggi
      if (consumed < target) {
        const missing = +(target - consumed).toFixed(1);
        const prevDaysBelow = daysBelow(daysData, t.id, t.target, 2, currentDate);
        // -1 = nessun dato storico → non mostrare badge streak
        const urgency = prevDaysBelow < 0 ? null : prevDaysBelow >= 2 ? "high" : prevDaysBelow === 1 ? "med" : "low";
        const suffix = urgency === "low"
          ? " (1° giorno consecutivo)"
          : urgency === "med"
          ? " (2° giorno consecutivo)"
          : " (3° giorno consecutivo — priorità alta)";
        tips.push({
          type: "needed",
          tassello: t,
          message: `Aggiungi ${missing} ${t.unit} di ${t.label}${urgency ? suffix : ""}`,
          urgency: urgency || "low",
        });
      }
    } else if (t.isMax) {
      // Energia — tetto con floor nutrizionale morbido (softMin)
      if (consumed > target) {
        tips.push({
          type: "exceeded",
          tassello: t,
          message: `${t.label} sopra il tetto (${consumed} su ${target})`,
          urgency: "high",
        });
      } else if (t.softMin != null && consumed < t.softMin) {
        // Floor: sotto softMin → avviso morbido con finestra 3 giorni (stessa logica isMin)
        const missing = +(t.softMin - consumed).toFixed(1);
        const prevDaysBelow = daysBelow(daysData, t.id, t.softMin, 2, currentDate);
        const urgency = prevDaysBelow < 0 ? null : prevDaysBelow >= 2 ? "high" : prevDaysBelow === 1 ? "med" : "low";
        const suffix = urgency === "low"
          ? " (1° giorno consecutivo)"
          : urgency === "med"
          ? " (2° giorno consecutivo)"
          : " (3° giorno consecutivo — riserve di glicogeno a rischio)";
        tips.push({
          type: "needed",
          tassello: t,
          message: `${t.label} sotto il minimo funzionale${urgency ? suffix : ""} — aggiungi almeno 1 parte`,
          urgency: urgency || "low",
        });
      } else if (consumed < target - 0.5) {
        tips.push({
          type: "room",
          tassello: t,
          message: `Hai ancora ${(target - consumed).toFixed(1)} ${t.unit} di ${t.label} disponibili`,
          urgency: "low",
        });
      }
    } else if (t.id === "forza") {
      // Forza — finestra 2 giorni, non si scende mai
      if (consumed < target) {
        const missing = +(target - consumed).toFixed(1);
        const prevDaysBelow = daysBelow(daysData, t.id, t.target, 1, currentDate);
        const urgency = prevDaysBelow < 0 ? null : prevDaysBelow >= 1 ? "high" : "med";
        const suffix = urgency === "high"
          ? " (2° giorno consecutivo — rischio massa muscolare)"
          : " (1° giorno consecutivo)";
        tips.push({
          type: "needed",
          tassello: t,
          message: `Manca ${missing} ${t.unit} di ${t.label}${urgency ? suffix : ""}`,
          urgency: urgency || "med",
        });
      } else if (t.softMax && consumed > t.softMax) {
        tips.push({
          type: "exceeded",
          tassello: t,
          message: `${t.label} ha superato il limite massimo`,
          urgency: "high",
        });
      }
    } else if (t.id === "frutto") {
      // Frutto — finestra 3 giorni come Foglia/Colore
      if (consumed < target) {
        const missing = +(target - consumed).toFixed(1);
        const prevDaysBelow = daysBelow(daysData, t.id, t.target, 2, currentDate);
        const urgency = prevDaysBelow < 0 ? null : prevDaysBelow >= 2 ? "high" : prevDaysBelow === 1 ? "med" : "low";
        const suffix = !urgency || urgency === "low"
          ? " (1° giorno consecutivo)"
          : urgency === "med"
          ? " (2° giorno consecutivo)"
          : " (3° giorno — priorità alta)";
        tips.push({
          type: "needed",
          tassello: t,
          message: `Manca ${missing} ${t.unit} di ${t.label}${urgency ? suffix : ""}`,
          urgency: urgency || "low",
        });
      } else if (t.softMax && consumed > t.softMax) {
        tips.push({
          type: "exceeded",
          tassello: t,
          message: `${t.label} ha superato il limite massimo`,
          urgency: "high",
        });
      }
      } else if (t.id === "oro") {
      // Oro — softMin e softMax letti da t (già mergiati dalla config)
      // Controlla se ieri ha sforato il target base, letto da t.target
      const ieriKey = dateKeyDaysBefore(currentDate, 1);
      const ieriDay = daysData[ieriKey];
      const ieriOro = ieriDay ? (ieriDay.oro || 0) : 0;
      const ieriHasData = ieriDay && Object.values(ieriDay).some(v => v > 0);
      const ieriSforato = ieriHasData && ieriOro > t.target;

      if (consumed < target) {
        const missing = +(target - consumed).toFixed(1);
        const belowMin = consumed < (t.softMin || 0);
        tips.push({
          type: "needed",
          tassello: t,
          message: belowMin
            ? `Manca ${missing} ${t.unit} di ${t.label} — sotto il minimo funzionale (1 cucchiaio)`
            : ieriSforato
            ? `Manca ${missing} ${t.unit} di ${t.label} — ieri hai sforato, oggi prova a restare sui ${t.target}`
            : `Manca ${missing} ${t.unit} di ${t.label}`,
          urgency: belowMin ? "high" : "med",
        });
      } else if (consumed <= t.softMax) {
        // Tra target e softMax: se ieri ha sforato, mostra promemoria leggero
        if (ieriSforato) {
          tips.push({
            type: "info",
            tassello: t,
            message: `Oro ok — ieri hai sforato, cerca di restare vicino ai ${t.target} oggi`,
            urgency: "low",
          });
        }
      } else if (t.softMax && consumed > t.softMax) {
        tips.push({
          type: "exceeded",
          tassello: t,
          message: `${t.label} ha superato il limite massimo`,
          urgency: "high",
        });
      }
    } else {
      // Tutti gli altri — comportamento standard
      if (consumed < target) {
        const missing = +(target - consumed).toFixed(1);
        tips.push({
          type: "needed",
          tassello: t,
          message: `Manca ${missing} ${t.unit} di ${t.label}`,
          urgency: missing > 1 ? "high" : "med",
        });
      } else if (t.softMax && consumed > t.softMax) {
        tips.push({
          type: "exceeded",
          tassello: t,
          message: `${t.label} ha superato il limite massimo`,
          urgency: "high",
        });
      }
    }
  });

  // A3 — Suggerimento contestuale ferro + vitamina C
  // Se oggi c'è almeno 0,5 Forza (legumi/tofu) e il flag vitc non è stato tappato,
  // aggiungi un tip informativo che ricorda la sinergia ferro+C nello stesso pasto.
  const forzaOggi = today["forza"] || 0;
  const vitcTappata = todayFlags ? !!todayFlags["vitc"] : false;
  if (forzaOggi >= 0.5 && !vitcTappata) {
    tips.push({
      type: "info",
      tassello: FLAGS.find((f) => f.id === "vitc") || { id: "vitc", label: "Vit. C", emoji: "🍋" },
      message: "Hai mangiato legumi o tofu: aggiungi vitamina C nello stesso pasto per moltiplicare l'assorbimento del ferro (limone, peperone crudo, kiwi)",
      urgency: "low",
    });
  }

  // Granello rolling softMax check — letto da granelloConfig
  if (granelloRolling !== undefined && granelloConfig.softMax && granelloRolling > granelloConfig.softMax) {
    tips.push({
      type: "exceeded",
      tassello: GRANELLO,
      message: `Granello oltre il tetto (${granelloRolling} su ${granelloConfig.softMax} cucchiai/7gg) — troppi grassi nella settimana`,
      urgency: "high",
    });
  }

  return tips.sort((a, b) => {
    const order = { high: 0, med: 1, low: 2 };
    return order[a.urgency] - order[b.urgency];
  });
}

// ===== logic/parse-item.js =====
// logic/parse-item.js
// Parsing del valore testuale del prontuario in tasselli + flag. Pura, nessun React.

// Parses a prontuario value string like "1 Forza + 0,5 Oro + 🟡 Omega-3"
// into { tasselli: { forza: 1, oro: 0.5 }, flags: ["omega3"] }
function parseItemValue(valueStr) {
  const tasselli = {};
  const flags = [];
  if (!valueStr) return { tasselli, flags };

  const tasselloMap = {
    energia: "energia", forza: "forza", foglia: "foglia",
    colore: "colore", frutto: "frutto", oro: "oro", granello: "granello",
  };
  const flagMap = { "omega-3": "omega3", "vit. c": "vitc", "calcio": "calcio" };

  const parts = valueStr.split("+").map((s) => s.trim());

  for (const part of parts) {
    const lower = part.toLowerCase();

    // Skip "0 tasselli" and standalone "jolly"
    if (lower.startsWith("0 tasselli") || lower === "jolly") continue;

    // Detect flags (🟡 ...)
    let isFlagPart = false;
    for (const [key, id] of Object.entries(flagMap)) {
      if (lower.includes(key)) { flags.push(id); isFlagPart = true; break; }
    }
    if (isFlagPart) continue;

    // Extract leading number + tassello name
    // Handles: "1 Energia", "0,5 Forza", "1,5 Oro", "0,5 Colore (jolly)"
    const match = part.match(/^([\d,]+)\s+([A-Za-z]+)/i);
    if (match) {
      const amount = parseFloat(match[1].replace(",", "."));
      const name = match[2].toLowerCase();
      if (tasselloMap[name] && amount > 0) {
        tasselli[tasselloMap[name]] = (tasselli[tasselloMap[name]] || 0) + amount;
      }
    }
  }

  return { tasselli, flags };
}

// ===== logic/classificatore-engine.js =====
// logic/classificatore-engine.js
// Funzioni pure del classificatore guidato: scala per quantità,
// arrotonda al mezzo e formatta l'esito nel formato del prontuario
// (compatibile con parseItemValue). Nessun React.

// Combina gli add di un nodo a scelta multipla (ripieni).
// Un solo componente vale pieno; da due in su si dividono lo spazio:
// ogni add viene dimezzato. Tasselli uguali si sommano.
function mergeRipienoAdds(adds) {
  const share = adds.length >= 2 ? 0.5 : 1;
  const out = {};
  for (const add of adds) {
    for (const [id, v] of Object.entries(add)) {
      out[id] = (out[id] || 0) + v * share;
    }
  }
  return out;
}

// Scala i tasselli accumulati per il fattore di quantità/dimensione.
// Arrotonda al mezzo; ogni voce presente non scende mai sotto 0,5.
function scaleTasselli(tasselli, factor) {
  const out = {};
  for (const [id, amount] of Object.entries(tasselli)) {
    if (amount <= 0) continue;
    const scaled = Math.round(amount * factor * 2) / 2;
    out[id] = Math.max(0.5, scaled);
  }
  return out;
}

// Formatta { energia: 1, oro: 0.5 } in "1 Energia + 0,5 Oro",
// lo stesso formato testuale del prontuario, parsabile da parseItemValue.
function formatTasselli(tasselli) {
  const labels = {
    energia: "Energia", forza: "Forza", foglia: "Foglia",
    colore: "Colore", frutto: "Frutto", oro: "Oro", granello: "Granello",
  };
  const order = ["energia", "forza", "foglia", "colore", "frutto", "oro", "granello"];
  const parts = [];
  for (const id of order) {
    const v = tasselli[id];
    if (!v) continue;
    const num = String(v).replace(".", ",");
    parts.push(`${num} ${labels[id]}`);
  }
  return parts.length ? parts.join(" + ") : "0 tasselli";
}

// ===== components/Counter.js =====
// components/Counter.js - riga di un tassello, l'interazione principale (+/-)

// ============================================================
// COUNTER (one tassello row) — the main interaction
// ============================================================

function Counter({ tassello, value, adjustedTarget, onChange, flagChip, streakWarning }) {
  const t = tassello;
  const target = adjustedTarget ?? t.target;
  const isAdjusted = adjustedTarget != null && adjustedTarget !== t.target;

  let statusColor = t.color;
  let statusLabel = null;
  let progress = 0;

  if (t.isMin) {
    progress = Math.min(value / target, 1);
    if (value >= target) {
      statusLabel = "ok";
    } else {
      statusLabel = `manca ${(target - value).toFixed(1)}`;
    }
  } else if (t.isMax) {
    progress = Math.min(value / target, 1);
    if (value > target) {
      statusLabel = `+${(value - target).toFixed(1)} sopra`;
      statusColor = "#b03832";
    } else if (value >= target - 0.5) {
      statusLabel = "vicino al tetto";
    } else {
      statusLabel = `${(target - value).toFixed(1)} disponibili`;
    }
  } else {
    progress = Math.min(value / target, 1);
    if (value >= target) {
      if (t.softMax && value > t.softMax) {
        statusLabel = "sopra il max";
        statusColor = "#b03832";
      } else {
        statusLabel = "ok";
      }
    } else {
      statusLabel = `manca ${target - value}`;
    }
  }

  const dec = () => onChange(Math.max(0, value - t.step));
  const inc = () => onChange(value + t.step);
  const [helpOpen, setHelpOpen] = useState(false);

  return (
    <div
      style={{
        background: "var(--bg-card)",
        borderRadius: "12px",
        padding: "14px 16px",
        marginBottom: "10px",
        border: "1px solid rgba(138, 90, 44, 0.12)",
        position: "relative",
      }}
    >
      {/* Progress bar in background */}
      <div
        style={{
          position: "absolute",
          left: 0,
          top: 0,
          bottom: 0,
          width: `${progress * 100}%`,
          background: t.bg,
          borderRadius: "12px 0 0 12px",
          opacity: 0.6,
          transition: "width 220ms ease-out",
        }}
      />
      <div style={{ position: "relative", display: "flex", alignItems: "center", gap: "12px" }}>
        {/* Color dot */}
        <div
          style={{
            width: "10px",
            height: "10px",
            borderRadius: "50%",
            background: t.color,
            flexShrink: 0,
          }}
        />
        {/* Label + Controls in one row */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            <span
              style={{
                fontFamily: "var(--font-display)",
                fontSize: "16px",
                fontWeight: 700,
                fontStyle: "italic",
                color: "var(--ink-strong)",
              }}
            >
              {t.label}
            </span>
            {t.help && (
              <button
                onClick={() => setHelpOpen(h => !h)}
                aria-label="Cosa conta in questo tassello"
                style={{
                  width: "17px",
                  height: "17px",
                  borderRadius: "50%",
                  border: `1px solid ${helpOpen ? t.color : "rgba(138,90,44,0.25)"}`,
                  background: helpOpen ? t.bg : "rgba(255,255,255,0.5)",
                  color: helpOpen ? t.color : "var(--ink-soft)",
                  cursor: "pointer",
                  display: "inline-flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: "9px",
                  fontWeight: 700,
                  flexShrink: 0,
                  transition: "all 150ms",
                  padding: 0,
                  lineHeight: 1,
                }}
              >
                ?
              </button>
            )}
            <span
              style={{
                fontSize: "10px",
                color: "var(--ink-soft)",
                fontStyle: "italic",
              }}
            >
              {t.sub}
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginTop: "4px" }}>
            <span
              style={{
                fontFamily: "var(--font-display)",
                fontSize: "20px",
                fontWeight: 700,
                fontStyle: "italic",
                color: t.color,
                lineHeight: 1,
                minWidth: "24px",
              }}
            >
              {value}
            </span>
            <span style={{ fontSize: "11px", color: "var(--ink-soft)" }}>
              / {target} {t.unit}
              {isAdjusted && (
                <span style={{ color: "#b03832", marginLeft: "4px", fontStyle: "italic" }}>
                  (rivisto)
                </span>
              )}
            </span>
            {statusLabel && (
              <span
                style={{
                  fontSize: "10px",
                  color: statusColor,
                  fontStyle: "italic",
                  fontWeight: 600,
                }}
              >
                {statusLabel}
              </span>
            )}
            {/* Spacer + Controls allineati a destra */}
            <div style={{ marginLeft: "auto", display: "flex", gap: "6px", flexShrink: 0 }}>
              <button
                onClick={dec}
                disabled={value === 0}
                aria-label={`Togli ${t.step} ${t.unit}`}
                style={{
                  width: "34px",
                  height: "34px",
                  borderRadius: "50%",
                  border: "1px solid rgba(138, 90, 44, 0.3)",
                  background: "rgba(255,255,255,0.6)",

                  cursor: value === 0 ? "not-allowed" : "pointer",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  transition: "all 150ms",
                }}
              >
                <Minus size={16} strokeWidth={2.5} />
              </button>
              <button
                onClick={inc}
                aria-label={`Aggiungi ${t.step} ${t.unit}`}

                  width: "34px",

                <Plus size={16} strokeWidth={2.5} />

          {/* Streak warning badge */}
          {streakWarning && value < (adjustedTarget ?? tassello.target) && (
            <div
              style={{
                marginTop: "5px",
                display: "inline-flex",
                alignItems: "center",
                gap: "5px",
                background: streakWarning === "high"
                  ? "rgba(176, 56, 50, 0.10)"
                  : "rgba(184, 136, 36, 0.12)",
                border: `1px solid ${
                  streakWarning === "high" ? "rgba(176,56,50,0.3)"
                  : "rgba(184,136,36,0.3)"
                }`,
                borderRadius: "20px",
                padding: "2px 8px",
                fontSize: "10px",
                fontStyle: "italic",
                color: streakWarning === "high" ? "#b03832" : "#996600",
                fontWeight: 600,
              }}
            >
              <span>{streakWarning === "high" ? "⚠" : "·"}</span>
              <span>
                {t.id === "forza"
                  ? streakWarning === "high"
                    ? "2° giorno consecutivo — rischio massa muscolare"
                    : "1° giorno consecutivo"
                  : streakWarning === "high"
                    ? "3° giorno consecutivo — priorità alta"
                    : streakWarning === "med"
                    ? "2° giorno consecutivo"
                    : "1° giorno consecutivo"
                }
              </span>
            </div>
          )}
          {/* SoftMin warning per Oro */}
          {t.id === "oro" && t.softMin && value < t.softMin && (
            <div
              style={{
                marginTop: "5px",
                display: "inline-flex",
                alignItems: "center",
                gap: "5px",
                background: "rgba(176, 56, 50, 0.10)",
                border: "1px solid rgba(176,56,50,0.3)",
                borderRadius: "20px",
                padding: "2px 8px",
                fontSize: "10px",
                fontStyle: "italic",
                color: "#b03832",
                fontWeight: 600,

// ===== components/DonutChart.js =====
// components/DonutChart.js - ciambella a 7 spicchi, uno per tassello

// ============================================================
// SUGGESTIONS PANEL
// ============================================================

// ── DonutChart: 7 spicchi, uno per tassello ──────────────────────────────────

function DonutChart({ today, adjustedTargets }) {
  const cx = 50, cy = 50, rOut = 44, rIn = 27;
  const total = TASSELLI.length;
  const sliceDeg = 360 / total;
  const gapDeg = 3;
  const startOffset = -90;

  const polar = (angle, r) => ({
    x: cx + r * Math.cos((angle * Math.PI) / 180),
    y: cy + r * Math.sin((angle * Math.PI) / 180),
  });

  const arcPath = (startAngle, endAngle) => {
    const s1 = polar(startAngle, rOut);
    const e1 = polar(endAngle, rOut);
    const s2 = polar(endAngle, rIn);
    const e2 = polar(startAngle, rIn);
    const large = endAngle - startAngle > 180 ? 1 : 0;
    return [
      `M ${s1.x.toFixed(2)} ${s1.y.toFixed(2)}`,
      `A ${rOut} ${rOut} 0 ${large} 1 ${e1.x.toFixed(2)} ${e1.y.toFixed(2)}`,
      `L ${s2.x.toFixed(2)} ${s2.y.toFixed(2)}`,
      `A ${rIn} ${rIn} 0 ${large} 0 ${e2.x.toFixed(2)} ${e2.y.toFixed(2)}`,
      "Z",
    ].join(" ");
  };

  // Returns { progress 0-1, exceeded bool, closed bool }
  const sliceState = (t) => {
    const v = today[t.id] || 0;
    const target = adjustedTargets[t.id] ?? t.target;

    if (t.isMin) {
      // Foglia, Colore: no max, più è meglio
      const progress = Math.min(v / target, 1);
      return { progress, exceeded: false, closed: v >= target };
    }

    if (t.isMax) {
      // Energia: ha un tetto — chiuso solo se hai mangiato qualcosa e non hai sforato
      if (v > target) return { progress: 1, exceeded: true, closed: false };
      const progress = target > 0 ? v / target : 0;
      const closed = v > 0 && v <= target;
      return { progress, exceeded: false, closed };
    }

    // Forza, Frutto, Oro: target morbido con eventuale softMax
    if (t.softMax && v > t.softMax) {
      return { progress: 1, exceeded: true, closed: false };
    }
    const progress = Math.min(v / target, 1);
    const closed = v >= target && (!t.softMax || v <= t.softMax);
    return { progress, exceeded: false, closed };
  };

  const states = TASSELLI.map(sliceState);
  const closedCount = states.filter((s) => s.closed).length;
  const allDone = closedCount === total;

  return (
    <svg
      viewBox="0 0 100 100"
      width="88"
      height="88"
      style={{ flexShrink: 0 }}
      aria-label={`${closedCount} tasselli chiusi su ${total}`}
    >
      {TASSELLI.map((t, i) => {
        const start = startOffset + i * sliceDeg + gapDeg / 2;
        const end = startOffset + (i + 1) * sliceDeg - gapDeg / 2;
        const { progress, exceeded } = states[i];
        // Opacità: 0.13 (vuoto) → 1.0 (pieno), interpolata sul progresso
        const opacity = 0.13 + progress * 0.87;
        // Colore: rosso accent se sforato, colore del tassello altrimenti
        const fill = exceeded ? "#b03832" : t.color;
        return (
          <path
            key={t.id}
            d={arcPath(start, end)}
            fill={fill}
            opacity={opacity}
            style={{ transition: "opacity 280ms ease, fill 280ms ease" }}
          />
        );
      })}
      {/* Testo centrale */}
      <text
        x={cx}
        y={cy - 5}
        textAnchor="middle"
        dominantBaseline="middle"
        fontSize="18"
        fontWeight="700"
        fontFamily="Palatino, Georgia, serif"
        fontStyle="italic"
        fill={allDone ? "#5a7a3c" : "#3a2818"}
      >
        {closedCount}
      </text>
      <text
        x={cx}
        y={cy + 9}
        textAnchor="middle"
        dominantBaseline="middle"
        fontSize="8"
        fontFamily="Palatino, Georgia, serif"
        fontStyle="italic"
        fill="#8a5a2c"
      >
        {"/ " + total}
      </text>
    </svg>
  );
}

// ===== panels/HistoryPanel.js =====
// panels/HistoryPanel.js - storico giorni

// ============================================================
// HISTORY PANEL (last 7 days as a small bar chart)
// ============================================================

function HistoryPanel({ daysData, flagsData, onClose, onSelectDay, onImport, isLogged }) {
  const last14Days = [];
  for (let i = 13; i >= 0; i--) {
    last14Days.push(daysAgoKey(i));
  }

  const dayStatus = (dateKey) => {
    const day = daysData[dateKey];
    if (!day) return { closed: 0, total: TASSELLI.length, empty: true };
    let closed = 0;
    TASSELLI.forEach((t) => {
      const v = day[t.id] || 0;
      const target = t.target;
      if (t.isMin && v >= target) closed++;
      else if (t.isMax && v > 0 && v <= target) closed++;
      else if (!t.isMin && !t.isMax && v >= target) closed++;
    });
    return { closed, total: TASSELLI.length, empty: false };
  };

  const handleImport = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const raw = JSON.parse(ev.target.result);
          const validKeys = Object.keys(raw).filter(k => k.startsWith("parti_day:") || k.startsWith("parti_flag:"));
          if (validKeys.length === 0) {
            alert("File non valido: nessun dato del Metodo delle Parti trovato.");
            return;
          }
          const giorni = validKeys.filter(k => k.startsWith("parti_day:")).length;

          const msg = isLogged
            ? "Importare " + giorni + " giorni di dati?\n\nI dati attuali del tuo account verranno sostituiti e sincronizzati su tutti i tuoi dispositivi."
            : "Importare " + giorni + " giorni di dati?\n\nATTENZIONE: non hai effettuato l'accesso. Questi dati sostituiranno solo i dati salvati su questo dispositivo e NON saranno sincronizzati. Per sincronizzarli su più dispositivi, accedi prima di importare.";

          if (!window.confirm(msg)) return;

          // Costruisce daysData e flagsData dal JSON
          const daysData  = {};
          const flagsData = {};
          validKeys.forEach(k => {
            const parsed = JSON.parse(raw[k]);
            if (k.startsWith("parti_day:"))  daysData[k.replace("parti_day:", "")]  = parsed;
            if (k.startsWith("parti_flag:")) flagsData[k.replace("parti_flag:", "")] = parsed;
          });

          // Delega ad App.js che gestisce localStorage + Supabase
          onImport(daysData, flagsData);
        } catch (err) {
          alert("Errore nel leggere il file: " + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(58, 40, 24, 0.55)",
        backdropFilter: "blur(4px)",
        display: "flex",
        alignItems: "flex-end",
        zIndex: 100,
        animation: "fadeIn 200ms ease-out",
      }}
      onClick={onClose}
    >
      <div
        style={{
          width: "100%",
          maxWidth: "440px",
          margin: "0 auto",
          background: "var(--bg-page)",
          borderRadius: "20px 20px 0 0",
          padding: "20px",
          maxHeight: "85vh",
          overflowY: "auto",
          animation: "slideUp 280ms cubic-bezier(0.2, 0.8, 0.2, 1)",
        }}
        onClick={(e) => e.stopPropagation()}
      >
        <div
          style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            marginBottom: "16px",
          }}
        >
          <div
            style={{
              fontFamily: "var(--font-display)",
              fontSize: "20px",
              fontStyle: "italic",
              color: "var(--ink-strong)",
            }}
          >
            Storico
          </div>
          <button
            onClick={onClose}
            style={{
              width: "32px",
              height: "32px",
              borderRadius: "50%",
              border: "none",
              background: "transparent",
              cursor: "pointer",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              color: "var(--ink-soft)",
            }}
          >
            <X size={20} />
          </button>
        </div>

        <div style={{ fontSize: "11px", color: "var(--ink-soft)", marginBottom: "12px", fontStyle: "italic" }}>
          Ultimi 14 giorni — clicca per modificare un giorno passato
        </div>

        {last14Days.map((dateKey) => {
          const status = dayStatus(dateKey);
          const ratio = status.empty ? 0 : status.closed / status.total;
          return (
            <button
              key={dateKey}
              onClick={() => {
                onSelectDay(dateKey);
                onClose();
              }}
              style={{
                width: "100%",
                display: "flex",
                alignItems: "center",
                gap: "12px",
                padding: "10px 12px",
                marginBottom: "4px",
                background: status.empty ? "rgba(0,0,0,0.02)" : "var(--bg-card)",
                border: "1px solid rgba(138, 90, 44, 0.1)",
                borderRadius: "8px",
                cursor: "pointer",
                textAlign: "left",
                opacity: status.empty ? 0.5 : 1,
              }}
            >
              <span style={{ fontSize: "12px", fontWeight: 600, minWidth: "70px" }}>
                {dayLabel(dateKey)}
              </span>
              <div
                style={{
                  flex: 1,
                  height: "6px",
                  background: "rgba(138, 90, 44, 0.1)",
                  borderRadius: "3px",
                  overflow: "hidden",
                }}
              >
                <div
                  style={{
                    width: `${ratio * 100}%`,
                    height: "100%",
                    background:
                      ratio >= 0.85
                        ? "#5a7a3c"
                        : ratio >= 0.6
                        ? "#b88824"
                        : "#b03832",
                  }}
                />
              </div>
              <span style={{ fontSize: "11px", color: "var(--ink-soft)", minWidth: "30px", textAlign: "right" }}>
                {status.empty ? "—" : `${status.closed}/${status.total}`}
              </span>
            </button>
          );
        })}

        {/* Export / Import */}
        <div style={{
          marginTop: "20px",
          paddingTop: "16px",
          borderTop: "1px dashed rgba(138, 90, 44, 0.2)",
        }}>
          <div style={{ fontSize: "11px", color: "var(--ink-soft)", fontStyle: "italic", marginBottom: "10px" }}>
            Backup dati — usa per passare a un nuovo dispositivo
          </div>
          <div style={{ display: "flex", gap: "5px" }}>
            <button
              onClick={() => {
                // Esporta lo scope ATTIVO (daysData/flagsData riflettono account o anonimo).
                // Il formato resta parti_day:/parti_flag: per compatibilità con l'import.
                const data = {};
                Object.entries(daysData).forEach(([k, v]) => {
                  data[`parti_day:${k}`] = JSON.stringify(v);
                });
                Object.entries(flagsData).forEach(([k, v]) => {
                  data[`parti_flag:${k}`] = JSON.stringify(v);
                });
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                const today = new Date().toISOString().slice(0, 10);
                a.download = "metodo_parti_" + today + ".json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
              }}
              style={{
                flex: 1,
                padding: "10px",
                background: "var(--bg-card)",
                border: "1px solid rgba(138, 90, 44, 0.25)",
                borderRadius: "8px",
                fontSize: "12px",
                fontWeight: 600,
                color: "#3a2818",
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: "6px",
              }}
            >
              ⬇ Esporta dati
            </button>
            <button
              onClick={handleImport}
              style={{
                flex: 1,
                padding: "10px",
                background: "#3a2818",
                border: "none",
                borderRadius: "8px",
                fontSize: "12px",
                fontWeight: 600,
                color: "white",
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: "6px",
              }}
            >
              ⬆ Importa dati
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// panels/ClassificatorePanel.js - classificatore guidato per alimenti fuori prontuario

// ============================================================
// CLASSIFICATORE PANEL — guided food classification wizard
// ============================================================
// Cammina l'albero CLASSIFICATORE (data/classificatore.js).
// Accumula tasselli e fattore di dimensione lungo il percorso,
// poi chiede la quantità (ramo alimento singolo) e mostra l'esito
// nel formato del prontuario, con aggiunta diretta al giorno.

function ClassificatorePanel({ onClose, onAddItem, addedLabel }) {
  const initial = {
    nodeId: CLASSIFICATORE.start,
    acc: {},
    factor: 1,
    unit: null,
    stage: "tree", // tree | qty | esito
  };
  const [state, setState] = useState(initial);
  const [history, setHistory] = useState([]);
  const [added, setAdded] = useState(false);
  const [multiSelected, setMultiSelected] = useState([]);

  const pushAndGo = (nextState) => {
    setHistory((prev) => [...prev, state]);
    setState(nextState);
    setMultiSelected([]);
    setAdded(false);
  };

  const handleOption = (opt) => {
    const acc = { ...state.acc };
    if (opt.add) {
      for (const [id, v] of Object.entries(opt.add)) {
        acc[id] = (acc[id] || 0) + v;
      }
    }
    const next = {
      nodeId: opt.next === "qty" || opt.next === "esito" ? state.nodeId : opt.next,
      acc,
      factor: opt.factor != null ? opt.factor : state.factor,
      unit: opt.unit || state.unit,
      stage: opt.next === "qty" ? "qty" : opt.next === "esito" ? "esito" : "tree",
    };
    pushAndGo(next);
  };

  const handleQty = (factor) => {
    pushAndGo({ ...state, factor, stage: "esito" });
  };

  const toggleMulti = (i) => {
    setMultiSelected((prev) =>
      prev.includes(i) ? prev.filter((x) => x !== i) : [...prev, i]
    );
  };

  const confirmMulti = (node) => {
    const adds = multiSelected.map((i) => node.opzioni[i].add).filter(Boolean);
    const merged = mergeRipienoAdds(adds);
    const acc = { ...state.acc };
    for (const [id, v] of Object.entries(merged)) {
      acc[id] = (acc[id] || 0) + v;
    }
    pushAndGo({
      ...state,
      acc,
      stage: node.next === "qty" ? "qty" : node.next === "esito" ? "esito" : "tree",
      nodeId: node.next === "qty" || node.next === "esito" ? state.nodeId : node.next,
    });
  };

  const goBack = () => {
    if (history.length === 0) return;
    setState(history[history.length - 1]);
    setHistory((prev) => prev.slice(0, -1));
    setMultiSelected([]);
    setAdded(false);
  };

  const restart = () => {
    setState(initial);
    setHistory([]);
    setMultiSelected([]);
    setAdded(false);
  };

  const finale = scaleTasselli(state.acc, state.factor);
  const finaleLabel = formatTasselli(finale);
  const hasTasselli = Object.keys(finale).length > 0;

  const handleAdd = () => {
    if (!onAddItem || !hasTasselli) return;
    onAddItem({ name: "Alimento classificato", value: finaleLabel });
    setAdded(true);
    setTimeout(() => setAdded(false), 1800);
  };

  const node = CLASSIFICATORE.nodes[state.nodeId];

  const optionBtnStyle = {
    width: "100%",
    textAlign: "left",
    background: "var(--bg-card)",
    border: "1px solid rgba(138, 90, 44, 0.2)",
    borderRadius: "12px",
    padding: "12px 14px",
    marginBottom: "8px",
    cursor: "pointer",
    color: "var(--ink)",
    fontFamily: "var(--font-body)",
  };

  const navBtnStyle = {
    background: "transparent",
    border: "none",
    cursor: "pointer",
    color: "var(--ink-soft)",
    fontSize: "12px",
    fontFamily: "var(--font-body)",
    padding: "6px 8px",
    textDecoration: "underline",
  };

  return (
    <SlidePanel
      title="Classifichiamolo insieme"
      subtitle="Qualche domanda visiva, nessuna etichetta da leggere."
      onClose={onClose}
    >
      {/* Navigazione: indietro e ricomincia */}
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "10px" }}>
        <button onClick={goBack} style={{ ...navBtnStyle, visibility: history.length ? "visible" : "hidden" }}>
          ← Indietro
        </button>
        <button onClick={restart} style={{ ...navBtnStyle, visibility: history.length ? "visible" : "hidden" }}>
          Ricomincia
        </button>
      </div>

      {state.stage === "tree" && (
        <div>
          <div
            style={{
              fontFamily: "var(--font-display)",
              fontSize: "17px",
              color: "var(--ink-strong)",
              marginBottom: node.nota ? "6px" : "14px",
            }}
          >
            {node.domanda}
          </div>
          {node.nota && (
            <div style={{ fontSize: "12px", color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: "14px" }}>
              {node.nota}
            </div>
          )}
          {node.opzioni.map((opt, i) => {
            const isMulti = !!node.multi;
            const isSelected = isMulti && multiSelected.includes(i);
            return (
              <button
                key={i}
                onClick={() => (isMulti ? toggleMulti(i) : handleOption(opt))}
                style={{
                  ...optionBtnStyle,
                  border: isSelected
                    ? "2px solid #8a5a2c"
                    : optionBtnStyle.border,
                  background: isSelected ? "rgba(138, 90, 44, 0.08)" : optionBtnStyle.background,
                }}
              >
                <div style={{ fontSize: "14px", fontWeight: 600 }}>
                  {isMulti ? (isSelected ? "✓ " : "") : ""}{opt.label}
                </div>
                {opt.hint && (
                  <div style={{ fontSize: "11px", color: "var(--ink-soft)", marginTop: "3px" }}>{opt.hint}</div>
                )}
              </button>
            );
          })}
          {node.multi && (
            <button
              onClick={() => confirmMulti(node)}
              style={{
                width: "100%",
                padding: "12px",
                borderRadius: "12px",
                border: "none",
                cursor: "pointer",
                background: "#8a5a2c",
                color: "#fff",
                fontSize: "14px",
                fontWeight: 700,
                fontFamily: "var(--font-body)",
                marginTop: "4px",
              }}
            >
              {multiSelected.length === 0 ? "Nessun ripieno rilevante, avanti" : "Conferma"}
            </button>
          )}
        </div>
      )}

      {state.stage === "qty" && (
        <div>
          <div
            style={{
              fontFamily: "var(--font-display)",
              fontSize: "17px",
              color: "var(--ink-strong)",
              marginBottom: "6px",
            }}
          >
            Quanto ne hai mangiato?
          </div>
          {state.unit && (
            <div style={{ fontSize: "12px", color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: "14px" }}>
              Riferimento per 1 porzione: {state.unit}.
            </div>
          )}
          {CLASSIFICATORE_QTY.map((q, i) => (
            <button key={i} onClick={() => handleQty(q.factor)} style={optionBtnStyle}>
              <div style={{ fontSize: "14px", fontWeight: 600 }}>{q.label}</div>
            </button>
          ))}
        </div>
      )}

      {state.stage === "esito" && (
        <div>
          <div
            style={{
              fontFamily: "var(--font-display)",
              fontSize: "17px",
              color: "var(--ink-strong)",
              marginBottom: "10px",
            }}
          >
            Ecco come conta
          </div>
          <div
            style={{
              background: "var(--bg-card)",
              border: "1px solid rgba(138, 90, 44, 0.25)",
              borderRadius: "12px",
              padding: "16px",
              textAlign: "center",
              fontSize: "18px",
              fontWeight: 700,
              color: "var(--ink-strong)",
              marginBottom: "12px",
            }}
          >
            {finaleLabel}
          </div>
          {hasTasselli ? (
            <button
              onClick={handleAdd}
              disabled={added}
              style={{
                width: "100%",
                padding: "12px",
                borderRadius: "12px",
                border: "none",
                cursor: added ? "default" : "pointer",
                background: added ? "rgba(90,122,60,0.85)" : "#8a5a2c",
                color: "#fff",
                fontSize: "14px",
                fontWeight: 700,
                fontFamily: "var(--font-body)",
                marginBottom: "12px",
              }}
            >
              {added ? `Aggiunto a ${addedLabel}` : `Aggiungi a ${addedLabel}`}
            </button>
          ) : (
            <div style={{ fontSize: "12px", color: "var(--ink-soft)", textAlign: "center", marginBottom: "12px" }}>
              Questo alimento non muove tasselli: nessuna aggiunta necessaria.
            </div>
          )}
          <div style={{ fontSize: "12px", color: "var(--ink-soft)", lineHeight: 1.5, textAlign: "center" }}>
            Nel dubbio tra due tasselli vicini, scegli e vai: il metodo regge l'approssimazione, è fatto per questo.
          </div>
        </div>
      )}
    </SlidePanel>
  );
}

// ===== panels/ProntuarioPanel.js =====
// panels/ProntuarioPanel.js - prontuario alimenti + aggiunta al giorno

// ============================================================
// PRONTUARIO PANEL — searchable food classification database
// ============================================================

function ProntuarioPanel({ onClose, onAddItem, addedLabel }) {
  const [query, setQuery] = useState("");
  const [classificatoreOpen, setClassificatoreOpen] = useState(false);
  const [addedItems, setAddedItems] = useState({});

  // Le sezioni partono collassate a ogni apertura del prontuario.
  // openSections è solo stato di sessione: tiene quali sezioni l'utente ha
  // aperto manualmente, senza persistenza (alla riapertura riparte chiuso).
  const [openSections, setOpenSections] = useState({});

  const toggleSection = (sectionName) => {
    setOpenSections((prev) => ({ ...prev, [sectionName]: !prev[sectionName] }));
  };

  const norm = (s) =>
    s
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

  const filtered = useMemo(() => {
    const q = norm(query.trim());
    if (!q) return PRONTUARIO;
    return PRONTUARIO.map((section) => ({
      ...section,
      items: section.items.filter((item) => {
        const hay = norm(item.name + " " + (item.note || "") + " " + item.value);
        return hay.includes(q);
      }),
    })).filter((section) => section.items.length > 0);
  }, [query]);

  const slotColor = (slot) => {
    const colors = {
      energia: "#8b6332", forza: "#b03832", foglia: "#5a7a3c",
      colore: "#c97a4d", frutto: "#a8456e", oro: "#b88824", granello: "#6b8a8a",
    };
    return colors[slot] || "#888";
  };

  const handleAdd = (item, key) => {
    if (!onAddItem) return;
    onAddItem(item);
    setAddedItems((prev) => ({ ...prev, [key]: true }));
    setTimeout(() => setAddedItems((prev) => { const n = { ...prev }; delete n[key]; return n; }), 1800);
  };

  const parsed = (item) => parseItemValue(item.value);
  const hasAction = (item) => {
    const { tasselli, flags } = parsed(item);
    return Object.keys(tasselli).length > 0 || flags.length > 0;
  };

  return (
    <SlidePanel
      title="Prontuario dei cibi"
      subtitle="Cerca un alimento o sfoglia per categoria. Tap su una riga per vedere la classificazione."
      onClose={onClose}
    >
      {/* Ingresso al classificatore guidato */}
      <button
        onClick={() => setClassificatoreOpen(true)}
        style={{
          width: "100%",
          padding: "10px 12px",
          marginBottom: "12px",
          borderRadius: "10px",
          border: "1px dashed rgba(138, 90, 44, 0.4)",
          background: "transparent",
          cursor: "pointer",
          color: "var(--ink)",
          fontSize: "13px",
          fontFamily: "var(--font-body)",
          fontWeight: 600,
        }}
      >
        Non lo trovi? Classifichiamolo insieme →
      </button>

      {/* Search box */}
      <div
        style={{
          position: "relative",
          marginBottom: "14px",
        }}
      >
        <Search
          size={16}
          color="var(--ink-soft)"
          style={{
            position: "absolute",
            left: "12px",
            top: "50%",
            transform: "translateY(-50%)",
            pointerEvents: "none",
          }}
        />
        <input
          type="text"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="cerca tofu, cornetto, hummus..."
          style={{
            width: "100%",
            padding: "10px 12px 10px 36px",
            fontSize: "13px",
            fontFamily: "var(--font-body)",
            background: "var(--bg-card)",
            border: "1px solid rgba(138, 90, 44, 0.2)",
            borderRadius: "10px",
            outline: "none",
            color: "var(--ink)",
            boxSizing: "border-box",
          }}
        />
        {query && (
          <button
            onClick={() => setQuery("")}
            style={{
              position: "absolute",
              right: "8px",
              top: "50%",
              transform: "translateY(-50%)",
              background: "transparent",
              border: "none",
              cursor: "pointer",
              color: "var(--ink-soft)",
              padding: "4px",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
            }}
          >
            <X size={14} />
          </button>
        )}
      </div>

      {filtered.length === 0 && (
        <div
          style={{
            textAlign: "center",
            padding: "30px 10px",
            color: "var(--ink-soft)",
            fontSize: "13px",
            fontStyle: "italic",
          }}
        >
          Nessun alimento corrisponde a "{query}".
          <br />
          <span style={{ fontSize: "11px" }}>
            Usa il principio dei 5 secondi: lista ingredienti corta = pieno valore nel tassello dominante, lista lunga = metà valore.
          </span>
          <br />
          <button
            onClick={() => setClassificatoreOpen(true)}
            style={{
              marginTop: "12px",
              padding: "9px 16px",
              borderRadius: "10px",
              border: "none",
              background: "#8a5a2c",
              color: "#fff",
              cursor: "pointer",
              fontSize: "13px",
              fontWeight: 700,
              fontFamily: "var(--font-body)",
            }}
          >
            Classifichiamolo insieme
          </button>
        </div>
      )}

      {filtered.map((section) => {
        // Durante la ricerca le sezioni con risultati restano sempre aperte.
        const isCollapsed = query.trim() ? false : !openSections[section.section];
        return (
        <div key={section.section} style={{ marginBottom: "10px" }}>
          {/* Section header — cliccabile */}
          <button
            onClick={() => toggleSection(section.section)}
            style={{
              width: "100%",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              background: "transparent",
              border: "none",
              borderBottom: isCollapsed
                ? "1px solid rgba(138,90,44,0.15)"
                : "1px solid rgba(138,90,44,0.15)",
              padding: "6px 4px",
              marginBottom: isCollapsed ? "2px" : "8px",
              cursor: "pointer",
              gap: "6px",
            }}
          >
            <span
              style={{
                fontSize: "9px",
                letterSpacing: "0.22em",
                fontWeight: 700,
                color: "var(--ink-soft)",
                textTransform: "uppercase",
                textAlign: "left",
                flex: 1,
              }}
            >
              {section.section}
            </span>
            <span
              style={{
                fontSize: "10px",
                color: "var(--ink-soft)",
                fontStyle: "italic",
                flexShrink: 0,
                marginRight: "2px",
              }}
            >
              {isCollapsed ? `${section.items.length} voci` : ""}
            </span>
            <svg
              width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="var(--ink-soft)" strokeWidth="2.5"
              strokeLinecap="round" strokeLinejoin="round"
              style={{
                flexShrink: 0,
                transition: "transform 200ms ease",
                transform: isCollapsed ? "rotate(-90deg)" : "rotate(0deg)",
              }}
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>

          {/* Items — nascosti se collassato */}
          {!isCollapsed && section.items.map((item, i) => {
            const itemKey = `${section.section}:${i}`;
            const isAdded = addedItems[itemKey];
            const canAdd = hasAction(item);
            const { tasselli: tv } = parsed(item);
            const mainSlot = item.slots[0];
            const btnColor = mainSlot ? slotColor(mainSlot) : "#8a5a2c";

            return (
              <div
                key={i}
                style={{
                  background: isAdded ? "rgba(90,122,60,0.07)" : "var(--bg-card)",
                  border: isAdded ? "1px solid rgba(90,122,60,0.3)" : "1px solid rgba(138, 90, 44, 0.1)",
                  borderRadius: "10px",
                  padding: "10px 12px",
                  marginBottom: "6px",
                  transition: "background 200ms, border 200ms",
                }}
              >
                {/* Row 1: dots + name + add button */}
                <div style={{ display: "flex", alignItems: "flex-start", gap: "8px" }}>
                  {/* Slot dots */}
                  <div style={{ display: "flex", gap: "3px", flexShrink: 0, paddingTop: "5px" }}>
                    {item.slots.length === 0 ? (
                      <div style={{ width: "8px", height: "8px", borderRadius: "50%", border: "1.5px solid #b0a090", background: "transparent" }} />
                    ) : (
                      item.slots.map((slot) => (
                        <div key={slot} style={{ width: "8px", height: "8px", borderRadius: "50%", background: slotColor(slot) }} />
                      ))
                    )}
                  </div>
                  {/* Name + portion */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: "13px", fontWeight: 600, color: "var(--ink-strong)", lineHeight: 1.3 }}>
                      {item.name}
                    </div>
                    <div style={{ fontSize: "10px", color: "var(--ink-soft)", fontStyle: "italic", marginTop: "1px" }}>
                      {item.portion}
                    </div>
                  </div>
                  {/* Add button */}
                  {canAdd && (
                    <button
                      onClick={() => handleAdd(item, itemKey)}
                      aria-label={isAdded ? "Aggiunto" : `Aggiungi ${item.name} al giorno`}
                      style={{
                        width: "28px",
                        height: "28px",
                        borderRadius: "50%",
                        flexShrink: 0,
                        border: isAdded ? "none" : `1.5px solid ${btnColor}`,
                        background: isAdded ? "#5a7a3c" : "rgba(255,255,255,0.7)",
                        color: isAdded ? "white" : btnColor,
                        cursor: "pointer",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        transition: "all 200ms",
                        marginTop: "1px",
                      }}
                    >
                      {isAdded
                        ? <Check size={13} strokeWidth={3} />
                        : <Plus size={13} strokeWidth={2.5} />
                      }
                    </button>
                  )}
                </div>
                {/* Row 2: value */}
                <div
                  style={{
                    fontSize: "11px",
                    fontWeight: 700,
                    fontStyle: "italic",
                    color: mainSlot ? slotColor(mainSlot) : "var(--ink-soft)",
                    marginTop: "4px",
                    paddingLeft: "18px",
                  }}
                >
                  {item.value}
                </div>
                {/* Row 3: note */}
                {item.note && (
                  <div
                    style={{
                      fontSize: "10px",
                      color: item.note.startsWith("⚠") ? "#b03832" : "var(--ink-soft)",
                      fontStyle: "italic",
                      marginTop: "4px",
                      paddingLeft: "18px",
                      lineHeight: 1.4,
                    }}
                  >
                    {item.note}
                  </div>
                )}
              </div>
            );
          })}

        </div>
        );
      })}

      {/* Classificatore guidato, overlay sopra il prontuario */}
      {classificatoreOpen && (
        <ClassificatorePanel
          onClose={() => setClassificatoreOpen(false)}
          onAddItem={onAddItem}
          addedLabel={addedLabel}
        />
      )}
    </SlidePanel>
  );
}
