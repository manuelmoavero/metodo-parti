// ===== panels/LoginPanel.js =====
// panels/LoginPanel.js
// Slide panel per login e registrazione.
// Usa supabaseAuth da data/supabase.js.
// onSuccess(user) viene chiamato dopo login o signup riuscito.

function LoginPanel({ onClose, onSuccess }) {
  const [tab, setTab]         = useState("login");   // "login" | "signup"
  const [email, setEmail]     = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]     = useState(null);
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    setError(null);
    if (!email.trim() || !password.trim()) {
      setError("Inserisci email e password.");
      return;
    }
    setLoading(true);
    try {
      let data;
      if (tab === "login") {
        data = await supabaseAuth.signIn(email.trim(), password);
      } else {
        data = await supabaseAuth.signUp(email.trim(), password);
      }
      const user = data.user || await supabaseAuth.getUser();
      onSuccess(user);
      onClose();
    } catch (e) {
      setError(e.message || "Errore di connessione.");
    } finally {
      setLoading(false);
    }
  };

  const inputStyle = {
    width: "100%",
    boxSizing: "border-box",
    padding: "10px 12px",
    border: "1px solid rgba(138, 90, 44, 0.25)",
    borderRadius: "8px",
    fontFamily: "var(--font-body)",
    fontSize: "14px",
    background: "rgba(255,255,255,0.7)",
    color: "var(--ink)",
    outline: "none",
    marginBottom: "10px",
  };

  const tabStyle = (active) => ({
    flex: 1,
    padding: "7px 0",
    border: "none",
    borderBottom: active ? "2px solid var(--accent)" : "2px solid transparent",
    background: "transparent",
    cursor: "pointer",
    fontFamily: "var(--font-body)",
    fontSize: "13px",
    fontWeight: active ? 700 : 400,
    color: active ? "var(--accent)" : "var(--ink-soft)",
  });

  return (
    <SlidePanel
      title="Sincronizzazione"
      subtitle="Accedi per salvare i tuoi dati su più dispositivi."
      onClose={onClose}
    >
      {/* Tab switcher */}
      <div style={{ display: "flex", marginBottom: "20px", borderBottom: "1px solid rgba(138,90,44,0.12)" }}>
        <button style={tabStyle(tab === "login")}  onClick={() => { setTab("login");  setError(null); }}>
          Accedi
        </button>
        <button style={tabStyle(tab === "signup")} onClick={() => { setTab("signup"); setError(null); }}>
          Registrati
        </button>
      </div>

      {/* Form */}
      <input
        type="email"
        placeholder="Email"
        value={email}
        onChange={e => setEmail(e.target.value)}
        style={inputStyle}
        autoComplete="email"
      />
      <input
        type="password"
        placeholder="Password"
        value={password}
        onChange={e => setPassword(e.target.value)}
        onKeyDown={e => e.key === "Enter" && handle()}
        style={{ ...inputStyle, marginBottom: "16px" }}
        autoComplete={tab === "login" ? "current-password" : "new-password"}
      />

      {error && (
        <div style={{
          fontSize: "12px",
          color: "#b03832",
          marginBottom: "12px",
          padding: "8px 10px",
          background: "rgba(176,56,50,0.07)",
          borderRadius: "6px",
        }}>
          {error}
        </div>
      )}

      <button
        onClick={handle}
        disabled={loading}
        style={{
          width: "100%",
          padding: "11px",
          background: loading ? "rgba(138,90,44,0.3)" : "var(--accent)",
          border: "none",
          borderRadius: "8px",
          color: "#fff",
          fontFamily: "var(--font-body)",
          fontSize: "14px",
          fontWeight: 700,
          cursor: loading ? "not-allowed" : "pointer",
        }}
      >
        {loading ? "..." : tab === "login" ? "Accedi" : "Registrati"}
      </button>

      {tab === "signup" && (
        <div style={{
          marginTop: "14px",
          fontSize: "11px",
          color: "var(--ink-soft)",
          fontStyle: "italic",
          lineHeight: 1.5,
          textAlign: "center",
        }}>
          I tuoi dati restano privati e visibili solo a te.
        </div>
      )}
    </SlidePanel>
  );
}

// ===== App.js =====
// ============================================================
// MAIN APP
// ============================================================

function App() {
  // Config per-utente: oggi sempre da default; domani potrà venire da Supabase
  // senza toccare nessun consumatore (tasselli, compensation, suggestions leggono da qui)
  const userConfig = getDefaultConfig();
  // Tasselli semantici + parametri quantitativi per-utente fusi insieme
  const tasselli = mergeTasselli(TASSELLI, userConfig);

  // State
  const [currentDate, setCurrentDate] = useState(todayKey());
  const [daysData, setDaysData]       = useState({});
  const [flagsData, setFlagsData]     = useState({});
  const [loading, setLoading]         = useState(true);
  const [user, setUser]               = useState(null);   // null = anonimo
  const [loginOpen, setLoginOpen]     = useState(false);
  const [historyOpen, setHistoryOpen]         = useState(false);
  const [guidaOpen, setGuidaOpen]             = useState(false);
  const [prontuarioOpen, setProntuarioOpen]   = useState(false);
  const [spesaOpen, setSpesaOpen]             = useState(false);

  // ── Mount: ripristina sessione, poi carica dati dallo scope corretto ─────
  useEffect(() => {
    (async () => {
      try {
        // Cleanup chiavi davvero obsolete: tutto ciò che inizia con "parti_"
        // ma NON è uno scope valido (day/flag anonimo, acct, auth).
        Object.keys(localStorage)
          .filter((k) => k.startsWith("parti_"))
          .filter((k) =>
            !k.startsWith("parti_day:") &&
            !k.startsWith("parti_flag:") &&
            !k.startsWith("parti_acct:") &&
            k !== "parti_auth"
          )
          .forEach((k) => localStorage.removeItem(k));

        // Prova a ripristinare la sessione Supabase
        const restoredUser = await supabaseAuth.restoreSession();

        if (restoredUser) {
          setUser(restoredUser);
          const uid = supabaseAuth.getCurrentUserId();

          // Carica da Supabase; se va a buon fine aggiorna la cache account
          const remote = await loadAllFromSupabase();
          if (remote) {
            partiStore.replace(uid, remote.daysData, remote.flagsData);
            setDaysData(remote.daysData);
            setFlagsData(remote.flagsData);
          } else {
            // Offline: usa la cache locale dell'account
            const cached = partiStore.load(uid);
            setDaysData(cached.daysData);
            setFlagsData(cached.flagsData);
          }
          return;
        }

        // Nessuna sessione: scope anonimo
        const anon = partiStore.load(null);
        setDaysData(anon.daysData);
        setFlagsData(anon.flagsData);

      } catch (e) {
        console.error("Load error:", e);
        const anon = partiStore.load(null);
        setDaysData(anon.daysData);
        setFlagsData(anon.flagsData);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  // ── Login riuscito: passa allo scope account ─────────────────────────────
  // I dati account SOSTITUISCONO la vista (non si fondono col locale anonimo).
  // Lo scope anonimo resta intatto e riappare al logout.
  const handleLoginSuccess = async (loggedUser) => {
    setUser(loggedUser);
    const uid = supabaseAuth.getCurrentUserId();
    const remote = await loadAllFromSupabase();
    if (remote) {
      partiStore.replace(uid, remote.daysData, remote.flagsData);
      setDaysData(remote.daysData);
      setFlagsData(remote.flagsData);
    } else {
      const cached = partiStore.load(uid);
      setDaysData(cached.daysData);
      setFlagsData(cached.flagsData);
    }
  };

  // ── Logout: torna allo scope anonimo ─────────────────────────────────────
  const handleLogout = async () => {
    await supabaseAuth.signOut();
    setUser(null);
    const anon = partiStore.load(null);
    setDaysData(anon.daysData);
    setFlagsData(anon.flagsData);
    setCurrentDate(todayKey());
  };

  // ── Import da JSON ───────────────────────────────────────────────────────
  // Loggato:    sovrascrive scope account + Supabase (sincronizzato).
  // Anonimo:    sovrascrive solo scope anonimo (locale, non sincronizzato).
  const handleImport = async (importedDays, importedFlags) => {
    const uid = supabaseAuth.getCurrentUserId();   // null se anonimo

    partiStore.replace(uid, importedDays, importedFlags);
    setDaysData(importedDays);
    setFlagsData(importedFlags);

    if (uid) {
      const uploads = [
        ...Object.entries(importedDays).map(([k, v])  => saveDayToSupabase(k, v)),
        ...Object.entries(importedFlags).map(([k, v]) => saveFlagToSupabase(k, v)),
      ];
      await Promise.all(uploads).catch(() => {});
    }
  };

  // ── Persist a day's data ─────────────────────────────────────────────────
  const updateDay = (dateKey, tasselloId, newValue) => {
    const uid    = supabaseAuth.getCurrentUserId();
    const newDay = { ...(daysData[dateKey] || {}), [tasselloId]: newValue };
    setDaysData((prev) => ({ ...prev, [dateKey]: newDay }));
    partiStore.setDay(uid, dateKey, newDay);
    if (uid) saveDayToSupabase(dateKey, newDay);
  };

  const toggleFlag = (dateKey, flagId) => {
    const uid         = supabaseAuth.getCurrentUserId();
    const dayFlags    = flagsData[dateKey] || {};
    const newDayFlags = { ...dayFlags, [flagId]: !dayFlags[flagId] };
    setFlagsData((prev) => ({ ...prev, [dateKey]: newDayFlags }));
    partiStore.setFlag(uid, dateKey, newDayFlags);
    if (uid) saveFlagToSupabase(dateKey, newDayFlags);
  };

  const resetToday = () => {
    if (!confirm("Azzerare la giornata di " + dayLabel(currentDate) + "?")) return;
    const uid = supabaseAuth.getCurrentUserId();
    setDaysData((prev) => {
      const next = { ...prev };
      delete next[currentDate];
      return next;
    });
    partiStore.removeDay(uid, currentDate);
    if (uid) deleteDayFromSupabase(currentDate);
  };

  // ── Add a prontuario item's tasselli to the current date atomically ──────
  const handleAddProntuarioItem = (item) => {
    const uid = supabaseAuth.getCurrentUserId();
    const { tasselli: itemTasselli, flags } = parseItemValue(item.value);

    const currentDay = daysData[currentDate] || {};
    const newDay     = { ...currentDay };
    let granelloIncrement = 0;
    let dayChanged        = false;

    for (const [id, amount] of Object.entries(itemTasselli)) {
      if (id === "granello") {
        granelloIncrement += amount;
      } else {
        newDay[id] = Math.round(((newDay[id] || 0) + amount) * 10) / 10;
        dayChanged  = true;
      }
    }

    if (dayChanged) {
      setDaysData((prev) => ({ ...prev, [currentDate]: newDay }));
      partiStore.setDay(uid, currentDate, newDay);
      if (uid) saveDayToSupabase(currentDate, newDay);
    }

    if (granelloIncrement > 0) {
      const currentGranello = (daysData[currentDate] || {}).granello || 0;
      const newGranello = Math.round((currentGranello + granelloIncrement) * 10) / 10;
      updateDay(currentDate, "granello", newGranello);
    }

    const todayFlags = flagsData[currentDate] || {};
    for (const flagId of flags) {
      if (!todayFlags[flagId]) toggleFlag(currentDate, flagId);
    }
  };

  // ── Derived state ────────────────────────────────────────────────────────
  const today    = daysData[currentDate] || {};
  const isToday  = currentDate === todayKey();
  const compensation = useMemo(
    () => (isToday ? computeCompensation(daysData, currentDate, userConfig) : {}),
    [daysData, currentDate, isToday]
  );

  const adjustedTargets = useMemo(() => {
    const out = {};
    tasselli.forEach((t) => {
      const adj = compensation[t.id];
      if (adj != null) {
        const newTarget = t.target + adj.delta;
        const floor     = t.softMin ?? 0;
        out[t.id]       = Math.max(floor, newTarget);
      } else {
        out[t.id] = t.target;
      }
    });
    return out;
  }, [compensation]);

  const flagStates = useMemo(
    () => computeFlagStates(flagsData, currentDate),
    [flagsData, currentDate]
  );

  const streakWarnings = useMemo(() => {
    const out = {};
    tasselli.forEach((t) => {
      const consumed   = today[t.id] || 0;
      const target     = adjustedTargets[t.id] ?? t.target;
      const isBelowToday = consumed < target;
      if (!isBelowToday) { out[t.id] = null; return; }

      if (t.id === "forza") {
        const prev = daysBelow(daysData, t.id, t.target, 1, currentDate);
        out[t.id]  = prev < 0 ? null : prev >= 1 ? "high" : "med";
      } else if (t.isMin || t.id === "frutto") {
        const prev = daysBelow(daysData, t.id, t.target, 2, currentDate);
        out[t.id]  = prev < 0 ? null : prev >= 2 ? "high" : prev === 1 ? "med" : "low";
      } else {
        out[t.id] = null;
      }
    });
    return out;
  }, [today, adjustedTargets, daysData, currentDate]);

  const navDay = (direction) => {
    const d = new Date(currentDate + "T12:00:00");
    d.setDate(d.getDate() + direction);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    if (d > today) return;
    const y   = d.getFullYear();
    const m   = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    setCurrentDate(`${y}-${m}-${day}`);
  };

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh",
        background: "var(--bg-page)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontFamily: "var(--font-display)",
        fontStyle: "italic",
        color: "var(--ink-soft)",
      }}>
        ...
      </div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "var(--bg-page)",
      fontFamily: "var(--font-body)",
      color: "var(--ink)",
    }}>
      <div style={{ maxWidth: "440px", margin: "0 auto", padding: "16px 14px 28px" }}>

        {/* Header */}
        <header style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          marginBottom: "12px",
          paddingTop: "4px",
        }}>
          <div>
            <div style={{
              fontSize: "9px",
              letterSpacing: "0.32em",
              fontWeight: 700,
              color: "var(--accent)",
              textTransform: "uppercase",
              marginBottom: "2px",
            }}>
              Il metodo delle parti
            </div>
            <div style={{
              fontFamily: "var(--font-display)",
              fontSize: "24px",
              fontStyle: "italic",
              color: "var(--ink-strong)",
              lineHeight: 1,
            }}>
              {dayLabel(currentDate)}
            </div>
          </div>
          <div style={{ display: "flex", gap: "5px" }}>
            {/* Pulsante sync/auth */}
            <button
              onClick={() => user ? handleLogout() : setLoginOpen(true)}
              aria-label={user ? "Disconnetti" : "Sincronizza su più dispositivi"}
              title={user ? `Connesso come ${user.email}` : "Accedi per sincronizzare"}
              style={{
                width: "34px",
                height: "34px",
                borderRadius: "50%",
                background: user ? "rgba(90,122,60,0.12)" : "rgba(255,255,255,0.7)",
                border: user ? "1px solid rgba(90,122,60,0.35)" : "1px solid rgba(138, 90, 44, 0.2)",
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                color: user ? "#5a7a3c" : "var(--accent)",
              }}
            >
              {user ? <CloudCheck size={17} /> : <Cloud size={17} />}
            </button>
            <button
              onClick={() => setGuidaOpen(true)}
              aria-label="Guida"
              style={{
                width: "34px", height: "34px", borderRadius: "50%",
                background: "rgba(255,255,255,0.7)",
                border: "1px solid rgba(138, 90, 44, 0.2)",
                cursor: "pointer", display: "flex", alignItems: "center",
                justifyContent: "center", color: "var(--accent)",
              }}
            >
              <Info size={17} />
            </button>
            <button
              onClick={() => setSpesaOpen(true)}
              aria-label="Lista della spesa"
              style={{
                width: "34px", height: "34px", borderRadius: "50%",
                background: "rgba(255,255,255,0.7)",
                border: "1px solid rgba(138, 90, 44, 0.2)",
                cursor: "pointer", display: "flex", alignItems: "center",
                justifyContent: "center", color: "var(--accent)",
              }}
            >
              <ShoppingCart size={17} />
            </button>
            <button
              onClick={() => setProntuarioOpen(true)}
              aria-label="Prontuario dei cibi"
              style={{
                width: "34px", height: "34px", borderRadius: "50%",
                background: "rgba(255,255,255,0.7)",
                border: "1px solid rgba(138, 90, 44, 0.2)",
                cursor: "pointer", display: "flex", alignItems: "center",
                justifyContent: "center", color: "var(--accent)",
              }}
            >
              <BookOpen size={17} />
            </button>
            <button
              onClick={() => setHistoryOpen(true)}
              aria-label="Storico"
              style={{
                width: "34px", height: "34px", borderRadius: "50%",
                background: "rgba(255,255,255,0.7)",
                border: "1px solid rgba(138, 90, 44, 0.2)",
                cursor: "pointer", display: "flex", alignItems: "center",
                justifyContent: "center", color: "var(--accent)",
              }}
            >
              <Calendar size={18} />
            </button>
          </div>
        </header>

        {/* Day navigation */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          marginBottom: "16px", background: "rgba(255,255,255,0.45)",
          borderRadius: "10px", padding: "6px 10px",
        }}>
          <button
            onClick={() => navDay(-1)}
            aria-label="Giorno precedente"
            style={{
              width: "28px", height: "28px", border: "none",
              background: "transparent", cursor: "pointer",
              color: "var(--ink-soft)", display: "flex",
              alignItems: "center", justifyContent: "center",
            }}
          >
            <ChevronLeft size={18} />
          </button>
          <span style={{ fontSize: "11px", color: "var(--ink-soft)", fontStyle: "italic" }}>
            {!isToday && (
              <button
                onClick={() => setCurrentDate(todayKey())}
                style={{
                  background: "transparent", border: "none",
                  color: "var(--accent)", cursor: "pointer",
                  fontStyle: "italic", fontSize: "11px", textDecoration: "underline",
                }}
              >
                torna a oggi
              </button>
            )}
            {isToday && "ultimi 7 giorni in continuo"}
          </span>
          <button
            onClick={() => navDay(1)}
            disabled={isToday}
            aria-label="Giorno successivo"
            style={{
              width: "28px", height: "28px", border: "none",
              background: "transparent",
              cursor: isToday ? "not-allowed" : "pointer",
              color: isToday ? "rgba(0,0,0,0.15)" : "var(--ink-soft)",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >
            <ChevronRight size={18} />
          </button>
        </div>

        {/* Suggestions */}
        {isToday && (
          <SuggestionsPanel
            today={today}
            adjustedTargets={adjustedTargets}
            daysData={daysData}
            currentDate={currentDate}
            granelloRolling={rollingGranello(daysData, currentDate)}
            todayFlags={flagsData[currentDate] || {}}
            tasselli={tasselli}
            granelloConfig={userConfig.granello}
          />
        )}

        {/* Compensation banner */}
        {isToday && Object.keys(compensation).length > 0 && (
          <div style={{
            background: "rgba(176, 56, 50, 0.08)",
            border: "1px solid rgba(176, 56, 50, 0.25)",
            borderRadius: "10px", padding: "10px 14px",
            marginBottom: "14px", fontSize: "12px",
            color: "var(--ink)", display: "flex",
            alignItems: "flex-start", gap: "8px",
          }}>
            <TrendingDown size={16} color="#b03832" style={{ marginTop: "1px", flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontStyle: "italic", fontWeight: 600, marginBottom: "2px" }}>
                Target rivisti per il rientro
              </div>
              {Object.entries(compensation).map(([id, adj]) => {
                const t         = tasselli.find((x) => x.id === id);
                const newTarget = adjustedTargets[id];
                return (
                  <div key={id} style={{ fontSize: "11px", color: "var(--ink)", marginTop: "2px" }}>
                    <span style={{ fontWeight: 600 }}>{t.label}</span>: {newTarget}{" "}
                    {t.unit} oggi ({adj.delta > 0 ? "+" : ""}{adj.delta} da {t.target})
                    {adj.remainingDebt && adj.remainingDebt > Math.abs(adj.delta) + 0.001 && (
                      <span style={{ color: "var(--ink-soft)", fontStyle: "italic" }}>
                        {" "}debito residuo {adj.remainingDebt.toFixed(1)}, prosegue domani
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Counters */}
        {tasselli.map((t) => {
          const inlineFlag = FLAGS.find((f) => f.tasselloId === t.id);
          const flagChip   = inlineFlag ? (
            <FlagChip
              flag={inlineFlag}
              state={flagStates[inlineFlag.id] || { tappedToday: false, status: "ok", daysSince: 0 }}
              onToggle={() => toggleFlag(currentDate, inlineFlag.id)}
            />
          ) : null;
          return (
            <Counter
              key={t.id}
              tassello={t}
              value={today[t.id] || 0}
              adjustedTarget={isToday ? adjustedTargets[t.id] : t.target}
              onChange={(v) => updateDay(currentDate, t.id, v)}
              flagChip={flagChip}
              streakWarning={isToday ? (streakWarnings[t.id] || null) : null}
            />
          );
        })}

        {/* Granello (weekly) */}
        <div style={{ marginTop: "16px", marginBottom: "10px" }}>
          <div style={{
            fontSize: "9px", letterSpacing: "0.28em", fontWeight: 700,
            color: "var(--ink-soft)", textTransform: "uppercase",
            paddingLeft: "4px", marginBottom: "8px",
          }}>
            Settimanale
          </div>
          <GranelloCounter
            value={rollingGranello(daysData, currentDate)}
            granelleOggi={today.granello || 0}
            onChange={(v) => updateDay(currentDate, "granello", v)}
          />
          <FlagsStandalone
            flagStates={flagStates}
            onToggle={(flagId) => toggleFlag(currentDate, flagId)}
          />
        </div>

        {/* Reset */}
        <button
          onClick={resetToday}
          style={{
            width: "100%", marginTop: "20px", padding: "10px",
            background: "transparent",
            border: "1px dashed rgba(138, 90, 44, 0.3)",
            borderRadius: "8px", cursor: "pointer",
            color: "var(--ink-soft)", fontSize: "11px",
            fontStyle: "italic", fontFamily: "var(--font-body)",
            display: "flex", alignItems: "center",
            justifyContent: "center", gap: "6px",
          }}
        >
          <RotateCcw size={12} />
          Azzera {dayLabel(currentDate).toLowerCase()}
        </button>

        {/* Footer */}
        <div style={{
          marginTop: "24px", paddingTop: "16px",
          borderTop: "1px dotted rgba(138, 90, 44, 0.25)",
          fontSize: "10px", color: "var(--ink-soft)",
          textAlign: "center", fontStyle: "italic", lineHeight: 1.5,
        }}>
          Una parte = un quarto di piatto.
          <br />
          Nessun calcolo di calorie. Solo riconoscimento e copertura.
        </div>
      </div>

      {/* Panels */}
      {loginOpen && (
        <LoginPanel
          onClose={() => setLoginOpen(false)}
          onSuccess={handleLoginSuccess}
        />
      )}
      {historyOpen && (
        <HistoryPanel
          daysData={daysData}
          flagsData={flagsData}
          onClose={() => setHistoryOpen(false)}
          onSelectDay={setCurrentDate}
          onImport={handleImport}
          isLogged={!!user}
        />
      )}
      {guidaOpen    && <GuidaPanel    onClose={() => setGuidaOpen(false)} />}
      {prontuarioOpen && (
        <ProntuarioPanel
          onClose={() => setProntuarioOpen(false)}
          onAddItem={handleAddProntuarioItem}
          addedLabel={dayLabel(currentDate)}
        />
      )}
      {spesaOpen && <SpesaPanel onClose={() => setSpesaOpen(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App));

</script>
</body>
</html>
